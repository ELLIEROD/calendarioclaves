<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendário de Claves & Produção</title>
  
  <!-- Configurações para PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0071BC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="watermark-background"></div>

  <!-- TELA DE ABERTURA (SPLASH SCREEN RESPONSIVA) -->
<div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; font-family: system-ui, -apple-system, sans-serif; transition: opacity 0.5s ease-out; pointer-events: auto;">
  <div style="text-align: center; color: #ffffff; padding: 20px; width: 100%; max-width: 500px;">
    
    <!-- ÍCONE RESPONSIVO -->
    <img src="./img/icon-512.png" alt="Logo" style="width: min(40vw, 28vh); height: auto; max-width: 220px; object-fit: contain; margin: 0 auto 20px auto; display: block;">
    
    <!-- TÍTULO E SUBTÍTULO DO APP -->
    <h1 style="font-size: clamp(1.4rem, 2.5vw, 2.2rem); font-weight: 800; color: #ffffff; margin: 0 0 8px 0; text-transform: uppercase; letter-spacing: -0.5px;">NOME DO APLICATIVO</h1>
    <p style="font-size: clamp(0.85rem, 1.2vw, 1.1rem); color: #94a3b8; margin: 0; font-weight: 400;">Slogan ou Descrição do App</p>
  </div>
</div>

  <div class="container">
    <h1>Calendário de Claves</h1>
    <h2>Consulta de Datas & Produção</h2>

    <div class="bloco-painel">
      <p class="secao-titulo">📋 Seleção de Linha e Produto</p>
      
      <div class="input-group">
        <label for="seletorLinha">Linha:</label>
        <select id="seletorLinha">
          <option value="linha20k">Linha 4 - 20k</option>
          <option value="linha3">Linha 3</option>
          <option value="bolleria">Linha 1 - Bolleria</option>
        </select>
      </div>

      <div class="input-group">
        <label for="seletorProduto">Produto:</label>
        <select id="seletorProduto"></select>
      </div>
    </div>

    <div class="bloco-painel" style="margin-top: 20px;">
      <p class="secao-titulo" style="background-color: #E31837;">📊 Dados Práticos de Produção</p>
      
      <div class="grid-dados">
        <div class="card-dado">
          <span class="label-dado">Data Atual</span>
          <span id="dataAtual" class="valor-dado">--/--/----</span>
        </div>
        <div class="card-dado">
          <span class="label-dado">Data Juliana</span>
          <span id="dataJuliana" class="valor-dado destaque-azul">---</span>
        </div>
        <div class="card-dado">
          <span class="label-dado">Semana de Produção</span>
          <span id="semanaProducao" class="valor-dado destaque-vermelho">--</span>
        </div>
        <div class="card-dado full-width">
          <span class="label-dado">Validade do Produto</span>
          <span id="dataValidade" class="valor-dado">--/--/----</span>
        </div>
        <div class="card-dado">
          <span class="label-dado">Retirada (DR)</span>
          <span id="dataRetirada" class="valor-dado">--/--</span>
        </div>
        <div class="card-dado">
          <span class="label-dado">Envio (DE)</span>
          <span id="dataEnvio" class="valor-dado">--/--</span>
        </div>
      </div>
    </div>
  </div>

  <div class="relogio-digital" id="relogioCentral">
    🕒 <span id="horaDigital">--:--:--</span>
  </div>

  <button id="toggleDarkMode" class="dark-toggle">🌙</button>
  <div id="darkOverlay"></div>

  <script src="script.js"></script>

  <!-- SCRIPT AUTÔNOMO DA SPLASH SCREEN -->
<script>
  (function() {
    function fecharSplash() {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.style.opacity = '0';
        splash.style.pointerEvents = 'none'; // Desativa cliques para não bloquear o app
        setTimeout(function() {
          splash.style.display = 'none';
        }, 500);
      }
    }

    // Executa o fechamento após 1.5 segundos
    setTimeout(fecharSplash, 1500);
  })();
</script>
  
</body>
</html>
